set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h 

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.tmux.conf

bind j resize-pane -D 5
bind k resize-pane -U 5
bind l resize-pane -R 5
bind h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

# list of tmux plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect' # persist tmux sessions after computer restart
set -g @plugin 'tmux-plugins/tmux-continuum' # automatically saves sessions for you every 15 minutes
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# --- Zellij-style appearance ---

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#a6e3a1'
set -g pane-border-lines heavy

# Status bar position
set -g status-position bottom
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-interval 5

# Status left: session name (zellij-style)
set -g status-left-length 40
set -g status-left '#[bg=#89b4fa,fg=#1e1e2e,bold] #{session_name} #[bg=#1e1e2e] '

# Window/tab list (zellij-style tabs)
set -g window-status-format '#[bg=#313244,fg=#cdd6f4] #I: #W #[bg=#1e1e2e]'
set -g window-status-current-format '#[bg=#a6e3a1,fg=#1e1e2e,bold] #I: #W #[bg=#1e1e2e]'
set -g window-status-separator ' '

# Status right: keybinding hints
set -g status-right-length 120
set -g status-right '#[fg=#6c7086] ^a |#[fg=#cdd6f4] Split-H  #[fg=#6c7086]^a -#[fg=#cdd6f4] Split-V  #[fg=#6c7086]^a m#[fg=#cdd6f4] Zoom  #[fg=#6c7086]^a r#[fg=#cdd6f4] Reload  #[bg=#89b4fa,fg=#1e1e2e,bold] ^a #[bg=#1e1e2e] '

# Message style
set -g message-style 'bg=#89b4fa fg=#1e1e2e bold'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
