--
-- Conky config for FreeBSD 15.0 + ZFS
-- Dark teal theme (Matcha-dark-sea) on 3440x1440 ultrawide
--

conky.config = {
    -- Window
    own_window = true,
    own_window_type = 'desktop',
    own_window_transparent = true,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,

    -- Position: top-right, below 36px panel
    alignment = 'top_right',
    gap_x = 24,
    gap_y = 44,

    -- Size
    minimum_width = 280,
    maximum_width = 280,

    -- Borders / margins
    border_inner_margin = 10,
    border_outer_margin = 0,
    draw_borders = false,
    draw_outline = false,
    draw_shades = false,
    draw_graph_borders = false,

    -- Font
    use_xft = true,
    font = 'Noto Sans:size=10',
    override_utf8_locale = true,
    uppercase = false,

    -- Colors
    default_color = 'e0e0e0',
    default_outline_color = 'e0e0e0',
    color1 = '2eb398',  -- teal accent for headings
    color2 = 'ffffff',  -- bright white
    color3 = '999999',  -- dimmed grey

    -- Behaviour
    background = false,
    double_buffer = true,
    no_buffers = true,
    text_buffer_size = 2048,
    update_interval = 2.0,
    cpu_avg_samples = 4,
    net_avg_samples = 2,

    -- Shortens units (KiB -> K, etc.)
    short_units = true,
    pad_percents = 2,
};

conky.text = [[
#-- HOSTNAME & UPTIME --------------------------------------------------------
${color1}${font Noto Sans:bold:size=13}${nodename}${font}${color}
${color3}${hr 1}${color}
${color3}Uptime:${color}  ${uptime_short}${alignr}${color3}${time %a %d %b  %H:%M}${color}

#-- CPU ----------------------------------------------------------------------
${color1}${font Noto Sans:bold:size=11}CPU${font}${color}
${color3}${hr 1}${color}
${color3}Average:${color} ${cpu cpu0}%${alignr}${color3}Freq:${color} ${freq_g}GHz
${color1}${cpugraph cpu0 30,280 2eb398 2eb398 -t}${color}
${color3}Core 1:${color} ${cpu cpu1}%${alignr}${cpubar cpu1 6,150}
${color3}Core 2:${color} ${cpu cpu2}%${alignr}${cpubar cpu2 6,150}
${color3}Core 3:${color} ${cpu cpu3}%${alignr}${cpubar cpu3 6,150}
${color3}Core 4:${color} ${cpu cpu4}%${alignr}${cpubar cpu4 6,150}

#-- MEMORY -------------------------------------------------------------------
${color1}${font Noto Sans:bold:size=11}MEMORY${font}${color}
${color3}${hr 1}${color}
${color3}Used:${color} ${mem} / ${memmax}${alignr}${memperc}%
${color1}${membar 6,280}${color}

#-- ZFS (zroot) --------------------------------------------------------------
${color1}${font Noto Sans:bold:size=11}ZFS  ${color3}${font Noto Sans:size=9}zroot${font}${color}
${color3}${hr 1}${color}
${color3}Used:${color}  ${execi 30 zfs list -Ho used zroot}${alignr}${color3}Avail:${color}  ${execi 30 zfs list -Ho avail zroot}
${color3}Health:${color} ${execi 60 zpool list -Ho health zroot}${alignr}${color3}Frag:${color}  ${execi 60 zpool list -Ho frag zroot}
${color3}Comp:${color}  ${execi 60 zfs get -Ho value compressratio zroot}${alignr}${color3}Cap:${color}   ${execi 30 zpool list -Ho cap zroot}

#-- NETWORK (vtnet0) ---------------------------------------------------------
${color1}${font Noto Sans:bold:size=11}NETWORK${font}  ${color3}${font Noto Sans:size=9}vtnet0${font}${color}
${color3}${hr 1}${color}
${color3}IP:${color} ${addr vtnet0}
${color3}Down:${color} ${downspeed vtnet0}/s${alignr}${color3}Total:${color} ${totaldown vtnet0}
${color1}${downspeedgraph vtnet0 25,280 2eb398 2eb398 -t}${color}
${color3}Up:  ${color} ${upspeed vtnet0}/s${alignr}${color3}Total:${color} ${totalup vtnet0}
${color1}${upspeedgraph vtnet0 25,280 2eb398 2eb398 -t}${color}

#-- TOP PROCESSES ------------------------------------------------------------
${color1}${font Noto Sans:bold:size=11}PROCESSES${font}${color}
${color3}${hr 1}${color}
${color3}${font Noto Sans:size=9}Name${alignr}PID      CPU   MEM${font}${color}
${color2}${font Noto Sans:size=9}${top name 1}${alignr}${top pid 1} ${top cpu 1}% ${top mem 1}%
${top name 2}${alignr}${top pid 2} ${top cpu 2}% ${top mem 2}%
${top name 3}${alignr}${top pid 3} ${top cpu 3}% ${top mem 3}%
${top name 4}${alignr}${top pid 4} ${top cpu 4}% ${top mem 4}%
${top name 5}${alignr}${top pid 5} ${top cpu 5}% ${top mem 5}%${font}${color}
]];
