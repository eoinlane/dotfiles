# Picom config - lightweight, optimized for RDP (no transparency/blur)

# Backend - use xrender for software rendering compatibility
backend = "xrender";

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.4;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g = 'xfce4-panel'",
    "class_g = 'Plank'",
    "_GTK_FRAME_EXTENTS@:c"
];

# No fading (saves bandwidth over RDP)
fading = false;

# No transparency/opacity (not useful over RDP)
inactive-opacity = 1.0;
active-opacity = 1.0;

# No blur
blur-background = false;

# VSync off (not needed over RDP, saves CPU)
vsync = false;

# Detect rounded corners
detect-rounded-corners = true;
detect-client-opacity = true;

# Performance
use-damage = true;
